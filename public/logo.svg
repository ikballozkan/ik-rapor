<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100" width="100%" height="100%">
  <style>
    .text {
      font-family: 'Arial Black', 'Helvetica', sans-serif;
      font-weight: 900;
      font-size: 85px;
      fill: #000000;
    }
  </style>
  
  <text x="15" y="82" class="text" letter-spacing="-3">TRIZ</text>
  
  <g transform="translate(285, 48)">
    <!-- Red circle -->
    <circle cx="0" cy="0" r="32" fill="#ED1C24" />
    
    <!-- White inner triangle (pointing down) -->
    <polygon points="-24,-13 24,-13 0,28" fill="#FFFFFF" />
    
    <!-- Red inner smaller triangle -->
    <polygon points="-13,-13 13,-13 0,10" fill="#ED1C24" />
    
    <!-- White bottom line to create the separate red bottom line -->
    <!-- Instead of a white line, let's just make the red bottom line as part of the circle by cutting the white triangle -->
    
    <!-- Red bottom line (it's actually just the bottom of the circle, separated by a thin white line) -->
    <rect x="-25" y="24" width="50" height="4" fill="#FFFFFF" />
  </g>
  
  <text x="330" y="82" class="text" letter-spacing="-3">NE</text>
</svg>
